<!DOCTYPE html>
<html>

<head>
    <title>ChatBot</title>

    <style>
        body {
            font-family: Arial;
        }

        .app {
            max-width: 600px;
            margin: 0 auto 0 auto;
        }

        .chatField {
            display: flex;
            margin-bottom: 20px;
        }

        .chatInput {
            padding: 10px 15px;
            font-size: 20px;
            border-radius: 10px;
            flex-grow: 1;
        }

        .sendBtn {
            padding: 10px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            background-color: rgb(21, 170, 21);
            color: white;
            cursor: pointer;
        }

        .chatText {
            background-color: rgb(237, 236, 236);
            margin: 0 10px 20px 10px;
            padding: 10px 12px;
            border-radius: 10px;
            max-width: 300px;
        }

        .chatTextUser {
            display: flex;
            align-items: start;
            justify-content: right;
        }

        .chatTextRobot {
            display: flex;
            align-items: start;
        }
    </style>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ChatInput({ chatMessages, setChatMessages }) {

            const [inputText, setInputText] = React.useState('')

            function saveInputText() {
                setInputText(event.target.value)
            }

            function sendMessage() {

                const newChatMessages = [

                    ...chatMessages,
                    {
                        message: inputText,
                        sender: 'user',
                        id: crypto.randomUUID()
                    }

                ]

                setChatMessages(newChatMessages)
                setInputText('')

                const response = Chatbot.getResponse(inputText)
                setChatMessages([
                    ...newChatMessages,
                    {
                        message: response,
                        sender: 'robot',
                        id: crypto.randomUUID()
                    }
                ])
                console.log(response)
            }

            function sendText() {
                if (event.key === 'Enter') {
                    const newChatMessages = [

                        ...chatMessages,
                        {
                            message: inputText,
                            sender: 'user',
                            id: crypto.randomUUID()
                        }

                    ]

                    setChatMessages(newChatMessages)
                    setInputText('')

                    const response = Chatbot.getResponse(inputText)
                    setChatMessages([
                        ...newChatMessages,
                        {
                            message: response,
                            sender: 'robot',
                            id: crypto.randomUUID()
                        }
                    ])
                    console.log(response)
                }

                if (event.key === 'Escape') {
                    setInputText('')
                }
            }

            return (
                <div className="chatField">
                    <input className="chatInput" placeholder="Send a message to ChatBox" size="50"
                        onChange={saveInputText}
                        onKeyDown={sendText}
                        value={inputText}
                    />
                    <button className="sendBtn" onClick={sendMessage}>Send</button>
                </div>
            )
        }

        function ChatMessages({ chatMessages, setChatMessages }) {

            return (
                <>
                    {
                        chatMessages.map((chatMessage) => {
                            return (
                                <ChatMessage
                                    message={chatMessage.message}
                                    sender={chatMessage.sender}
                                    key={chatMessage.id}
                                />
                            )
                        })
                    }
                </>
            )
        }

        function ChatMessage({ message, sender, }) {

            return (
                <div className={
                    sender === 'user' ? 'chatTextUser' : 'chatTextRobot'
                }>
                    {sender === 'robot' && <img src="./assets/robot.png" width="45" alt="" />}

                    <div className="chatText">{message}</div>

                    {sender === 'user' && <img src="./assets/user.png" width="45" alt="" />}
                </div>
            )
        }

        function App() {

            const [chatMessages, setChatMessages] = React.useState([])

            return (
                <div className="app">

                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                    />
                    <ChatMessages
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                    />
                </div>
            )
        }


        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
